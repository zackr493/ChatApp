upstream chat_servers {
    least_conn;

    server chat-server-1:8081;
    server chat-server-2:8081;
    server chat-server-3:8081;
}

server {
    listen 8090;

    # Message endpoint — long timeout to handle slow processing
    location /server/message {
        proxy_pass            http://chat_servers;
        proxy_read_timeout    310s;
        proxy_send_timeout    310s;
        proxy_connect_timeout 5s;

        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check — short timeout
    location /server/health {
        proxy_pass         http://chat_servers;
        proxy_read_timeout 5s;
    }
}